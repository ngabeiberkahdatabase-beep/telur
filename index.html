<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .nav-active { color: #2563eb; border-top: 3px solid #2563eb; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="pb-24">

  <div class="bg-blue-600 p-6 text-white rounded-b-3xl shadow-lg mb-6">
    <h1 class="text-xs opacity-80 uppercase tracking-widest">BUMDes Ngabei Berkah</h1>
    <p class="text-sm">Saldo Bersih Hari Ini</p>
    <h2 id="display-saldo" class="text-3xl font-bold mt-1">Rp 0</h2>
  </div>

  <div class="container mx-auto px-4">
    
    <div id="kasir" class="tab-content active">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <h3 class="font-semibold mb-4 text-gray-700">Entri Penjualan</h3>
        <div class="space-y-4">
          <input type="text" id="petugas" placeholder="Nama Petugas" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
          <div class="flex gap-2">
            <input type="number" id="kg" placeholder="Berat (Kg)" class="w-1/2 p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
            <input type="number" id="harga" placeholder="Harga/Kg" class="w-1/2 p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
          </div>
          <div class="p-4 bg-blue-50 rounded-xl">
            <p class="text-xs text-blue-600">Total Bayar</p>
            <p id="total-view" class="text-xl font-bold text-blue-800">Rp 0</p>
          </div>
          <button onclick="prosesTransaksi()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-95 transition-all">SAVE & PRINT</button>
        </div>
      </div>
    </div>

    <div id="biaya" class="tab-content">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <h3 class="font-semibold mb-4 text-gray-700">Input Biaya Operasional</h3>
        <div class="space-y-3">
          <input type="date" id="tgl-biaya" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
          <input type="text" id="ket-biaya" placeholder="Keterangan" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
          <input type="number" id="nom-biaya" placeholder="Nominal (Rp)" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200">
          <button onclick="simpanBiaya()" class="w-full bg-red-500 text-white font-semibold py-3 rounded-xl">Simpan Biaya</button>
        </div>
      </div>
    </div>

    <div id="riwayat" class="tab-content">
       <div id="list-riwayat" class="space-y-2 text-sm">Loading...</div>
    </div>
  </div>

  <div class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around py-3 text-gray-400">
    <button onclick="openTab('kasir', this)" class="nav-active flex flex-col items-center">
      <span class="text-[10px]">KASIR</span>
    </button>
    <button onclick="openTab('biaya', this)" class="flex flex-col items-center">
      <span class="text-[10px]">BIAYA</span>
    </button>
    <button onclick="openTab('riwayat', this)" class="flex flex-col items-center">
      <span class="text-[10px]">RIWAYAT</span>
    </button>
    <button onclick="openTab('laporan', this)" class="flex flex-col items-center">
      <span class="text-[10px]">LAPORAN</span>
    </button>
    <button onclick="openTab('setting', this)" class="flex flex-col items-center">
      <span class="text-[10px]">SETTING</span>
    </button>
  </div>

  <script>
    // Sinkronisasi Real-time Sederhana
    window.onload = refreshData;

    function refreshData() {
      google.script.run.withSuccessHandler(data => {
        document.getElementById('display-saldo').innerText = "Rp " + data.saldo.toLocaleString();
      }).getDashboardData();
    }

    function openTab(tabName, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('button').forEach(b => b.classList.remove('nav-active'));
      document.getElementById(tabName).classList.add('active');
      el.classList.add('nav-active');
      refreshData();
    }

    function prosesTransaksi() {
      const pet = document.getElementById('petugas').value;
      const kg = document.getElementById('kg').value;
      const hrg = document.getElementById('harga').value;
      const tot = kg * hrg;
      const tgl = new Date().toISOString();

      google.script.run.withSuccessHandler(() => {
        // Integrasi RawBT
        const printUrl = `rawbt:data/text,BUMDes Ngabei Berkah\n----------------\nPetugas: ${pet}\n${kg}kg x ${hrg}\nTotal: ${tot}\n----------------\nTerima Kasih`;
        window.location.href = printUrl;
        
        // Reset Form
        document.getElementById('petugas').value = "";
        document.getElementById('kg').value = "";
        document.getElementById('harga').value = "";
        refreshData();
      }).saveData('transaksi', [tgl, pet, kg, hrg, tot]);
    }
    
    // Fungsi biaya, riwayat, dll ditambahkan dengan pola yang sama
  </script>
</body>
</html>
