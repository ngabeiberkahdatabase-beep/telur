<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUMDes NGABEHI BERKAH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8fafc; padding-bottom: 90px; }
        .app-card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .tab { display: none; }
        .tab.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #e2e8f0; height: 75px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #64748b; border: none; background: none; }
        .nav-item.active { color: #2563eb; }
        .table-responsive { border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

<div class="p-3">
    <div class="bg-dark text-white p-4 rounded-4 mb-4 shadow">
        <h4 class="fw-bold mb-0 text-info">BUMDes NGABEHI BERKAH</h4>
        <small id="tgl-info"></small>
        <hr class="opacity-25">
        <div class="d-flex justify-content-between text-warning fw-bold">
            <small>Saldo Bersih Hari Ini:</small>
            <h5 id="dash-saldo">Rp 0</h5>
        </div>
    </div>

    <div id="tab-kasir" class="tab active">
        <div class="app-card">
            <label class="small fw-bold text-muted">PETUGAS ADMIN</label>
            <input type="text" id="admin" class="form-control mb-2" placeholder="Nama Admin">
            <div class="row g-2">
                <div class="col-6">
                    <label class="small fw-bold text-muted">BERAT (KG)</label>
                    <input type="number" id="berat" class="form-control" placeholder="0.0" oninput="hitung()">
                </div>
                <div class="col-6">
                    <label class="small fw-bold text-muted">HARGA (RP)</label>
                    <input type="number" id="harga" class="form-control" placeholder="25000" oninput="hitung()">
                </div>
            </div>
        </div>
        <div class="app-card bg-primary text-white text-center">
            <small class="opacity-75">TOTAL BAYAR</small>
            <h2 id="total-display" class="fw-bold">Rp 0</h2>
        </div>
        <button onclick="simpanTrx()" class="btn btn-dark w-100 py-3 fw-bold">SAVE & PRINT</button>
    </div>

    <div id="tab-biaya" class="tab">
        <div class="app-card border-start border-danger border-4">
            <h6 class="fw-bold text-danger">INPUT PENGELUARAN</h6>
            <input type="text" id="ket-biaya" class="form-control mb-2" placeholder="Keterangan">
            <input type="number" id="nom-biaya" class="form-control mb-3" placeholder="Nominal Rp">
            <button onclick="simpanBiaya()" class="btn btn-danger w-100 fw-bold">SIMPAN BIAYA</button>
        </div>
        <h6 class="fw-bold small text-muted px-2">DAFTAR BIAYA</h6>
        <div id="list-biaya-full"></div>
    </div>

    <div id="tab-riwayat" class="tab">
        <h6 class="fw-bold small text-muted px-2">RIWAYAT TRANSAKSI</h6>
        <div id="list-riwayat"></div>
    </div>

    <div id="tab-laporan" class="tab">
        <div class="app-card border-top border-dark border-4">
            <h6 class="fw-bold small">LAPORAN HARIAN</h6>
            <input type="date" id="tgl-lap" class="form-control mb-2" onchange="updateLaporan()">
            <div id="res-harian" class="p-2 bg-light rounded small fw-bold mb-2">Pilih Tanggal</div>
            <button onclick="cetakLaporan('Harian')" class="btn btn-dark btn-sm w-100">PRINT LAPORAN</button>
        </div>
        <div class="app-card border-top border-primary border-4">
            <h6 class="fw-bold small text-primary">LAPORAN BULANAN</h6>
            <input type="month" id="bln-lap" class="form-control mb-2" onchange="updateLaporan()">
            <div id="res-bulanan" class="p-2 bg-light rounded small fw-bold mb-2 text-primary">Pilih Bulan</div>
            <button onclick="cetakLaporan('Bulanan')" class="btn btn-primary btn-sm w-100">PRINT LAPORAN</button>
        </div>
    </div>

    <div id="tab-opsi" class="tab">
        <div class="app-card text-center">
            <button onclick="exportExcel()" class="btn btn-success w-100 py-3 fw-bold mb-2">BACKUP KE EXCEL</button>
            <small class="text-muted">Data disimpan permanen di Google Sheets.</small>
        </div>
    </div>
</div>

<nav class="bottom-nav shadow-lg">
    <button class="nav-item active" onclick="nav('kasir', this)">🛒 KASIR</button>
    <button class="nav-item" onclick="nav('biaya', this)">💸 BIAYA</button>
    <button class="nav-item" onclick="nav('riwayat', this)">📋 RIWAYAT</button>
    <button class="nav-item" onclick="nav('laporan', this)">📊 LAPORAN</button>
    <button class="nav-item" onclick="nav('opsi', this)">⚙️ OPSI</button>
</nav>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx1k_4-qjxRiM_DIj33AAW2sboLEq2OzCeRGLwIxLc9C8S9x5V-B4lsS2tYX6bKzMLd/exec"; 

    let db_trx = [];
    let db_biaya = [];
    let limitTampilTrx = 20;

    const getTodayISO = () => new Date().toISOString().split('T')[0];

    const loading = (show) => {
        document.body.style.opacity = show ? "0.6" : "1";
        document.body.style.pointerEvents = show ? "none" : "auto";
    };

    window.onload = async () => {
        document.getElementById('tgl-info').innerText = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
        await muatDataDariCloud();
    };

    async function muatDataDariCloud() {
        try {
            loading(true);
            const res = await fetch(API_URL);
            const data = await res.json();
            db_trx = data.db_trx || [];
            db_biaya = data.db_biaya || [];
            updateDashboard();
        } catch (err) {
            alert("Gagal koneksi ke server!");
        } finally {
            loading(false);
        }
    }

    function nav(s, el) {
        document.querySelectorAll('.tab').forEach(x => x.style.display = 'none');
        document.getElementById('tab-' + s).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(s === 'riwayat') renderRiwayat();
        if(s === 'biaya') renderBiaya();
    }

    function hitung() {
        const t = (Number(document.getElementById('berat').value) || 0) * (Number(document.getElementById('harga').value) || 0);
        document.getElementById('total-display').innerText = "Rp " + t.toLocaleString();
    }

    // ✅ NORMALISASI FORMAT TANGGAL (BIAR DATA LAMA TETAP KEBACA)
    function normalizeDate(tgl) {
        if (!tgl) return "";
        if (tgl.includes('-')) return tgl; // sudah ISO
        const p = tgl.split('/');
        if (p.length === 3) {
            return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
        }
        return tgl;
    }

    function updateDashboard() {
        const hariIni = getTodayISO();

        const totalMasuk = db_trx.reduce((a, b) => {
            return normalizeDate(b.tgl) === hariIni ? a + (Number(b.total) || 0) : a;
        }, 0);

        const totalKeluar = db_biaya.reduce((a, b) => {
            return normalizeDate(b.tgl) === hariIni ? a + (Number(b.nominal) || 0) : a;
        }, 0);

        document.getElementById('dash-saldo').innerText = "Rp " + (totalMasuk - totalKeluar).toLocaleString();
    }

    function cetakRawBT(item) {
        let s = "   BUMDes NGABEHI BERKAH\n================================\nTgl  : " + (item.tgl || "-") + "\nAdm  : " + item.adm + "\n--------------------------------\nBERAT  : " + item.kg + " Kg\nHARGA  : Rp " + item.hrg.toLocaleString() + "\nTOTAL  : Rp " + item.total.toLocaleString() + "\n================================\n       TERIMA KASIH\n\n\n";
        window.location.href = "rawbt:base64," + btoa(s);
    }

    async function simpanTrx() {
        const adm = document.getElementById('admin').value || 'Admin';
        const kg = Number(document.getElementById('berat').value);
        const hrg = Number(document.getElementById('harga').value);
        if(!kg) return alert("Isi Berat!");

        const item = { 
            id: Date.now(), 
            adm, 
            kg, 
            hrg, 
            total: kg * hrg,
            tgl: getTodayISO()
        };

        try {
            loading(true);
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "add_trx", data: item }) });
            if(res.ok) {
                db_trx.push(item);
                cetakRawBT(item);
                document.getElementById('berat').value = ""; 
                hitung(); 
                updateDashboard();
            }
        } catch (e) { alert("Gagal Simpan!"); } finally { loading(false); }
    }

    async function simpanBiaya() {
        const ket = document.getElementById('ket-biaya').value;
        const nom = Number(document.getElementById('nom-biaya').value);
        if(!nom) return alert("Isi nominal!");

        const item = { 
            id: Date.now(), 
            ket, 
            nominal: nom,
            tgl: getTodayISO()
        };

        try {
            loading(true);
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "add_biaya", data: item }) });
            if(res.ok) {
                db_biaya.push(item);
                document.getElementById('ket-biaya').value = ""; 
                document.getElementById('nom-biaya').value = "";
                renderBiaya(); 
                updateDashboard();
            }
        } catch (e) { alert("Gagal!"); } finally { loading(false); }
    }

    function renderBiaya() {
        document.getElementById('list-biaya-full').innerHTML = db_biaya.slice().reverse().map(b => `
            <div class="app-card border-end border-danger border-4 py-2">
                <div class="d-flex justify-content-between align-items-center">
                    <div><b>${b.ket}</b><br><small class="text-muted">${b.tgl}</small></div>
                    <div class="text-end">
                        <b class="text-danger">Rp ${Number(b.nominal).toLocaleString()}</b><br>
                        <button onclick="editBiaya(${b.id},'${b.ket}',${b.nominal})" class="btn btn-link btn-sm p-0 me-2">Edit</button>
                        <button onclick="hapusData(${b.id},'biaya')" class="btn btn-link btn-sm p-0 text-danger">Hapus</button>
                    </div>
                </div>
            </div>`).join('') || '<p class="text-center py-3">Kosong</p>';
    }

    function renderRiwayat() {
        const data = db_trx.slice().reverse().slice(0, limitTampilTrx);
        let h = `<div class="table-responsive"><table class="table table-sm table-striped small">
            <thead class="table-dark"><tr><th>Tgl/Adm</th><th>Detail</th><th>Aksi</th></tr></thead>
            <tbody>${data.map(x => `
                <tr>
                    <td><small>${x.tgl}</small><br><b>${x.adm}</b></td>
                    <td>${x.kg}kg<br><b class="text-primary">Rp${x.total.toLocaleString()}</b></td>
                    <td>
                        <div class="d-flex gap-1">
                            <button onclick="cetakRawBT(${JSON.stringify(x).replace(/"/g, '&quot;')})" class="btn btn-dark btn-sm">🖨️</button>
                            <button onclick="editTrx(${x.id},'${x.adm}',${x.kg},${x.hrg})" class="btn btn-primary btn-sm">✏️</button>
                            <button onclick="hapusData(${x.id},'trx')" class="btn btn-danger btn-sm">🗑️</button>
                        </div>
                    </td>
                </tr>`).join('')}</tbody></table></div>`;
        if(db_trx.length > limitTampilTrx) h += `<button onclick="limitTampilTrx+=20;renderRiwayat()" class="btn btn-outline-primary btn-sm w-100">Muat Lebih Banyak...</button>`;
        document.getElementById('list-riwayat').innerHTML = h;
    }

    function updateLaporan() {
        const d = document.getElementById('tgl-lap').value;
        const m = document.getElementById('bln-lap').value;

        if(d) {
            const o = db_trx.filter(x => normalizeDate(x.tgl) === d).reduce((a,b)=>a+(Number(b.total)||0),0);
            const b = db_biaya.filter(x => normalizeDate(x.tgl) === d).reduce((a,b)=>a+(Number(b.nominal)||0),0);
            document.getElementById('res-harian').innerHTML = `Masuk: Rp ${o.toLocaleString()}<br>Keluar: Rp ${b.toLocaleString()}<hr>LABA: Rp ${(o-b).toLocaleString()}`;
        }

        if(m) {
            const oM = db_trx.filter(x => normalizeDate(x.tgl).startsWith(m)).reduce((a,b)=>a+(Number(b.total)||0),0);
            const bM = db_biaya.filter(x => normalizeDate(x.tgl).startsWith(m)).reduce((a,b)=>a+(Number(b.nominal)||0),0);
            document.getElementById('res-bulanan').innerHTML = `Masuk: Rp ${oM.toLocaleString()}<br>Keluar: Rp ${bM.toLocaleString()}<hr>LABA: Rp ${(oM-bM).toLocaleString()}`;
        }
    }

    function cetakLaporan(tipe) {
        const isi = (tipe === 'Harian') ? document.getElementById('res-harian').innerText : document.getElementById('res-bulanan').innerText;
        if(isi.includes("Pilih")) return alert("Pilih data!");
        const s = `   LAPORAN ${tipe.toUpperCase()}\n================================\n${isi}\n================================\n\n\n`;
        window.location.href = "rawbt:base64," + btoa(s);
    }

    function exportExcel() {
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(db_trx), "Transaksi");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(db_biaya), "Biaya");
        XLSX.writeFile(wb, "Backup_BUMDes.xlsx");
    }
</script>
</body>
</html>
