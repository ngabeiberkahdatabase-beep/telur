<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; background-color: #f1f5f9; padding-bottom: 90px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .nav-btn.active { color: #2563eb; border-top: 3px solid #2563eb; font-weight: bold; }
  </style>
</head>
<body>

  <div class="bg-blue-600 p-6 text-white rounded-b-3xl shadow-lg mb-6 text-center">
    <h1 class="text-xs opacity-80 font-bold uppercase tracking-widest">BUMDes Ngabei Berkah</h1>
    <p class="text-sm mt-2">Saldo Bersih Hari Ini</p>
    <h2 id="disp-saldo" class="text-3xl font-bold">Rp 0</h2>
  </div>

  <div class="container mx-auto px-4">
    
    <div id="tab-kasir" class="tab-content active">
      <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
        <h3 class="font-bold text-gray-700 border-b pb-2">ENTRI KASIR</h3>
        <input type="text" id="petugas" placeholder="Nama Petugas" class="w-full p-3 bg-gray-50 rounded-xl border ring-1 ring-gray-100">
        <div class="flex gap-2">
          <input type="number" id="kg" oninput="hitungTotal()" placeholder="Berat (Kg)" class="w-1/2 p-3 bg-gray-50 rounded-xl border ring-1 ring-gray-200">
          <input type="number" id="harga" oninput="hitungTotal()" placeholder="Harga/Kg" class="w-1/2 p-3 bg-gray-50 rounded-xl border ring-1 ring-gray-200">
        </div>
        <div class="p-4 bg-blue-50 rounded-xl text-center">
          <p class="text-xs text-blue-600">Total Bayar</p>
          <h3 id="total-text" class="text-2xl font-bold text-blue-800">Rp 0</h3>
        </div>
        <button onclick="simpanTrx()" id="btn-trx" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md uppercase">Save & Print</button>
      </div>
    </div>

    <div id="tab-biaya" class="tab-content">
      <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
        <h3 class="font-bold text-gray-700 border-b pb-2 text-red-600">INPUT BIAYA</h3>
        <input type="text" id="ket-biaya" placeholder="Keterangan Biaya" class="w-full p-3 bg-gray-50 rounded-xl border ring-1 ring-gray-100">
        <input type="number" id="nom-biaya" placeholder="Nominal (Rp)" class="w-full p-3 bg-gray-50 rounded-xl border ring-1 ring-gray-100">
        <button onclick="simpanBiaya()" id="btn-biaya" class="w-full bg-red-500 text-white font-bold py-4 rounded-xl shadow-md uppercase">Simpan Biaya</button>
      </div>
    </div>

    <div id="tab-riwayat" class="tab-content">
      <h3 class="font-bold mb-3 text-gray-700 uppercase px-2">Riwayat Hari Ini</h3>
      <div id="list-riwayat" class="space-y-2"></div>
    </div>

  </div>

  <div class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around py-3">
    <button onclick="navClick('tab-kasir', this)" class="nav-btn active flex-1 text-[10px]">KASIR</button>
    <button onclick="navClick('tab-biaya', this)" class="nav-btn flex-1 text-[10px]">BIAYA</button>
    <button onclick="navClick('tab-riwayat', this)" class="nav-btn flex-1 text-[10px]">RIWAYAT</button>
  </div>

  <script>
    // 1. Fungsi Kalkulasi (Wajib Jalan)
    function hitungTotal() {
      const kg = parseFloat(document.getElementById('kg').value) || 0;
      const hrg = parseFloat(document.getElementById('harga').value) || 0;
      const total = kg * hrg;
      document.getElementById('total-text').innerText = "Rp " + total.toLocaleString('id-ID');
    }

    // 2. Navigasi Menu (Wajib Jalan)
    function navClick(id, btn) {
      // Sembunyikan semua tab
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      // Nonaktifkan semua tombol
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      
      // Tampilkan tab yang dipilih
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
      
      if(id === 'tab-riwayat') loadRiwayat();
      updateDashboard();
    }

    // 3. Simpan Transaksi Kasir
    function simpanTrx() {
      const pet = document.getElementById('petugas').value;
      const kg = document.getElementById('kg').value;
      const hrg = document.getElementById('harga').value;
      const tot = kg * hrg;

      if(!pet || !kg || !hrg) return alert("Mohon lengkapi data!");

      document.getElementById('btn-trx').innerText = "PROSES...";
      
      google.script.run.withSuccessHandler(() => {
        // Print via RawBT
        window.location.href = `rawbt:data/text,BUMDes Ngabei Berkah\n----------------\nPetugas: ${pet}\nBerat  : ${kg} kg\nHarga  : ${hrg}\nTotal  : ${tot}\n----------------\n`;
        
        // Kosongkan input sesuai permintaan
        document.getElementById('petugas').value = "";
        document.getElementById('kg').value = "";
        document.getElementById('harga').value = "";
        document.getElementById('total-text').innerText = "Rp 0";
        document.getElementById('btn-trx').innerText = "SAVE & PRINT";
        updateDashboard();
      }).saveData('transaksi', [new Date(), pet, kg, hrg, tot]);
    }

    function updateDashboard() {
      google.script.run.withSuccessHandler(res => {
        document.getElementById('disp-saldo').innerText = "Rp " + res.saldo.toLocaleString('id-ID');
      }).getDashboardData();
    }

    window.onload = updateDashboard;
  </script>
</body>
</html>
