<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; background-color: #f8fafc; padding-bottom: 100px; }
    .tab-content { display: none; }
    .active { display: block; }
    .nav-active { color: #2563eb; font-weight: bold; border-top: 4px solid #2563eb; }
    input { font-size: 16px !important; }
  </style>
</head>
<body>

  <div class="fixed top-0 w-full bg-blue-600 text-white p-6 shadow-lg z-50 rounded-b-3xl">
    <div class="flex justify-between items-center">
      <div>
        <p class="text-[10px] uppercase font-bold opacity-70">BUMDes Ngabei Berkah</p>
        <h2 id="disp-saldo" class="text-3xl font-black">Rp 0</h2>
      </div>
      <button onclick="refreshData()" class="bg-blue-500 p-2 rounded-full">🔄</button>
    </div>
  </div>

  <div class="container mx-auto px-4 mt-32">
    
    <div id="tab-kasir" class="tab-content active">
      <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100 space-y-4">
        <input type="text" id="petugas" placeholder="Nama Petugas" class="w-full p-4 bg-gray-50 rounded-2xl border ring-1 ring-gray-100 outline-none">
        <div class="flex gap-2">
          <input type="number" id="kg" oninput="hitung()" placeholder="Kg" class="w-1/2 p-4 bg-gray-50 rounded-2xl border ring-1 ring-gray-200 outline-none">
          <input type="number" id="harga" oninput="hitung()" placeholder="Harga" class="w-1/2 p-4 bg-gray-50 rounded-2xl border ring-1 ring-gray-200 outline-none">
        </div>
        <div class="p-4 bg-blue-50 rounded-2xl text-center border-2 border-dashed border-blue-200">
          <p class="text-xs text-blue-500">Total Bayar</p>
          <h3 id="total-text" class="text-2xl font-black text-blue-800">Rp 0</h3>
        </div>
        <button onclick="simpanTrx()" id="btn-save" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest">SAVE & PRINT</button>
      </div>
    </div>

    <div id="tab-biaya" class="tab-content">
      <div class="bg-white p-6 rounded-3xl shadow-md space-y-4">
        <h3 class="font-bold text-red-600 border-b pb-2">INPUT BIAYA</h3>
        <input type="text" id="ket-biaya" placeholder="Keterangan" class="w-full p-4 bg-gray-50 rounded-2xl border ring-1 ring-gray-100">
        <input type="number" id="nom-biaya" placeholder="Nominal Rp" class="w-full p-4 bg-gray-50 rounded-2xl border ring-1 ring-gray-100">
        <button onclick="simpanBiaya()" id="btn-biaya" class="w-full bg-red-500 text-white font-black py-4 rounded-2xl shadow-lg uppercase">Simpan Biaya</button>
      </div>
    </div>

    <div id="tab-laporan" class="tab-content">
      <div class="bg-white p-6 rounded-3xl shadow-md space-y-4">
        <h3 class="font-bold text-gray-700 uppercase">Laporan Bulanan</h3>
        <input type="month" id="filter-bulan" class="w-full p-3 border rounded-xl">
        <button onclick="tampilLaporan()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Tampilkan Laporan</button>
        <div id="hasil-laporan" class="mt-4 space-y-2 text-sm"></div>
      </div>
    </div>

    <div id="tab-setting" class="tab-content">
      <div class="bg-white p-6 rounded-3xl shadow-md space-y-4">
        <h3 class="font-bold text-gray-700 uppercase">Pengaturan</h3>
        <button onclick="exportExcel()" class="w-full bg-gray-700 text-white py-4 rounded-2xl font-bold">BACK UP EXCEL</button>
        <button onclick="resetData()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold">RESET SEMUA DATA</button>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 shadow-inner z-50">
    <button onclick="nav('tab-kasir', this)" class="nav-active flex-1 text-[9px] font-bold">KASIR</button>
    <button onclick="nav('tab-biaya', this)" class="flex-1 text-[9px] font-bold text-gray-400">BIAYA</button>
    <button onclick="nav('tab-laporan', this)" class="flex-1 text-[9px] font-bold text-gray-400">LAPORAN</button>
    <button onclick="nav('tab-setting', this)" class="flex-1 text-[9px] font-bold text-gray-400">SETTING</button>
  </div>

  <script>
    function hitung() {
      const kg = parseFloat(document.getElementById('kg').value) || 0;
      const hrg = parseFloat(document.getElementById('harga').value) || 0;
      document.getElementById('total-text').innerText = "Rp " + (kg * hrg).toLocaleString('id-ID');
    }

    function nav(id, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('button').forEach(b => b.classList.remove('nav-active'));
      document.getElementById(id).classList.add('active');
      el.classList.add('nav-active');
      refreshData();
    }

    function simpanTrx() {
      const p = document.getElementById('petugas').value;
      const k = document.getElementById('kg').value;
      const h = document.getElementById('harga').value;
      const t = k * h;
      if(!p || !k || !h) return alert("Lengkapi data!");

      // Respon Instan agar tidak terasa lama
      const btn = document.getElementById('btn-save');
      btn.innerText = "MENYIMPAN...";
      btn.disabled = true;

      google.script.run.withSuccessHandler(() => {
        window.location.href = `rawbt:data/text,BUMDes Ngabei Berkah\n----------------\nPetugas: ${p}\nBerat  : ${k}kg\nHarga  : ${h}\nTotal  : ${t}\n----------------\n`;
        document.getElementById('kg').value = "";
        document.getElementById('harga').value = "";
        document.getElementById('total-text').innerText = "Rp 0";
        btn.innerText = "SAVE & PRINT";
        btn.disabled = false;
        refreshData();
      }).saveData('transaksi', [new Date(), p, k, h, t]);
    }

    function simpanBiaya() {
      const ket = document.getElementById('ket-biaya').value;
      const nom = document.getElementById('nom-biaya').value;
      if(!ket || !nom) return alert("Lengkapi data!");

      google.script.run.withSuccessHandler(() => {
        alert("Biaya Tersimpan!");
        document.getElementById('ket-biaya').value = "";
        document.getElementById('nom-biaya').value = "";
        refreshData();
      }).saveData('biaya', [new Date(), ket, nom]);
    }

    function refreshData() {
      google.script.run.withSuccessHandler(res => {
        document.getElementById('disp-saldo').innerText = "Rp " + res.saldo.toLocaleString('id-ID');
      }).getDashboardData();
    }

    function exportExcel() {
       window.open('https://docs.google.com/spreadsheets/d/' + google.script.host.origin + '/export?format=xlsx');
    }

    function resetData() {
      if(confirm("Hapus semua data transaksi & biaya?")) {
        google.script.run.withSuccessHandler(msg => { alert(msg); refreshData(); }).resetAllData();
      }
    }

    window.onload = refreshData;
  </script>
</body>
</html>
